<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matin Roosta | Academic Portfolio</title>
    
    <!-- Favicon (Fixed Path & Cache Buster added) -->
    <link rel="icon" type="image/jpeg" href="images/favicon.jpg?v=1">
    <link rel="shortcut icon" type="image/jpeg" href="images/favicon.jpg?v=1">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================= */
        /* ----- متغیرهای رنگی (برای دارک مود) ----- */
        /* ========================================= */
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #444444;
            --text-light: #555555;
            --border-color: #111111;
            --header-bg: rgba(255, 255, 255, 0.98);
            --accent-blue: #2548ff;
            --card-bg: #ffffff;
            --card-hover-bg: #111111;
            --card-hover-text: #ffffff;
            --item-hover-bg: #fafafa;
            --abstract-border: #dddddd;
            --svg-fill: #111111;
        }

        /* رنگ های حالت تاریک */
        body.dark-mode {
            --bg-color: #121212;
            --text-main: #f0f0f0;
            --text-muted: #cccccc;
            --text-light: #aaaaaa;
            --border-color: #f0f0f0;
            --header-bg: rgba(18, 18, 18, 0.98);
            --accent-blue: #6b8aff; /* آبی روشن تر برای دیده شدن در پس زمینه تیره */
            --card-bg: #1e1e1e;
            --card-hover-bg: #f0f0f0;
            --card-hover-text: #111111;
            --item-hover-bg: #1a1a1a;
            --abstract-border: #333333;
            --svg-fill: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            transition: background-color 0.4s ease, color 0.4s ease; /* انیمیشن نرم تغییر تم */
        }

        /* ========================================= */
        /* ----- Scroll-to-Top with Circular Progress ----- */
        /* ========================================= */
        .scroll-to-top-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: var(--card-bg);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body.dark-mode .scroll-to-top-btn {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            background-color: var(--card-bg);
        }

        .scroll-to-top-btn.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .scroll-to-top-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        body.dark-mode .scroll-to-top-btn:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        }

        .progress-circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-bg {
            fill: var(--card-bg);
            stroke: var(--item-hover-bg);
            stroke-width: 6px;
            transition: stroke 0.4s ease, fill 0.4s ease;
        }

        body.dark-mode .progress-bg {
            stroke: #2a2a2a;
        }

        .progress-bar {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 6px;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 0.1s linear, stroke 0.4s ease;
        }

        .arrow-up {
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease, transform 0.3s ease;
            z-index: 2;
        }

        .scroll-to-top-btn:hover .arrow-up {
            color: var(--accent-blue);
            transform: translateY(-2px);
        }

        /* ----- Header & Nav ----- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--header-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            border-bottom: 2px solid var(--border-color);
            z-index: 1000;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-main);
        }

        /* دکمه زبان و دارک مود */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: 30px;
        }

        .lang-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 800;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .lang-toggle:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background-color: var(--item-hover-bg);
        }

        .theme-toggle svg {
            fill: none;
            stroke: var(--text-main);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            width: 20px;
            height: 20px;
            transition: stroke 0.4s ease;
        }

        /* ----- Hero Section ----- */
        .hero {
            display: flex;
            height: 100vh;
            padding-top: 80px; 
            border-bottom: 2px solid var(--border-color);
            transition: border-color 0.4s ease;
        }

        .content-left {
            flex: 1;
            padding: 80px 80px 80px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 2px solid var(--border-color);
            transition: border-color 0.4s ease;
        }

        .badge {
            background-color: var(--text-main);
            color: var(--bg-color);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            align-self: flex-start;
            margin-bottom: 30px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        h1 {
            font-size: 4.5rem;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 25px;
        }

        h1 .highlight {
            color: var(--accent-blue);
            transition: color 0.4s ease;
        }

        p.description {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.8;
            max-width: 90%;
            margin-bottom: 40px;
            transition: color 0.4s ease;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: 2px solid var(--text-main);
        }

        /* افکت جذاب برای هاور دکمه (بالا آمدن و سایه آبی) */
        .btn-primary:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(37, 72, 255, 0.4);
            background-color: var(--text-main);
            border-color: var(--text-main);
        }

        .btn-primary span {
            margin-left: 8px;
            font-size: 1.2rem;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--item-hover-bg);
        }

        /* ----- Image Right ----- */
        .image-right {
            flex: 1;
            background-image: url('images/profile.jpg'); 
            background-size: cover;
            background-position: center top;
            filter: grayscale(100%); 
            display: flex;
            align-items: flex-end;
        }

        .image-caption {
            width: 100%;
            background-color: rgba(30, 30, 35, 0.92); 
            color: #fff; /* این بخش همیشه سفید میماند چون پس زمینه اش تاریک است */
            padding: 10px 30px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* ----- General Sections ----- */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 50px;
        }

        .section-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            display: inline-block;
            transition: border-color 0.4s ease;
        }

        /* ----- Research Section ----- */
        #research {
            padding: 0;
        }

        .research-item {
            display: flex;
            padding: 80px 50px;
            border-bottom: 1px solid var(--abstract-border);
            gap: 50px;
            transition: background-color 0.4s;
        }

        .research-item:hover {
            background-color: var(--item-hover-bg);
        }

        .research-left {
            flex: 1;
        }

        .research-num {
            color: var(--accent-blue);
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 15px;
            text-transform: uppercase;
            transition: color 0.4s ease;
        }

        .research-left h3 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .research-right {
            flex: 2;
        }

        .research-right p {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.8;
            transition: color 0.4s ease;
        }

        .keyword-tags {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.3s;
            background: transparent;
        }

        .tag:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        /* ----- Publications Section (Interactive) ----- */
        .pub-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .pub {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 35px 40px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }
        
        .pub:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(37, 72, 255, 0.1);
            transform: translateY(-5px);
        }

        .pub h4 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.5;
            color: var(--text-main);
            transition: color 0.3s;
        }

        .pub:hover h4 {
            color: var(--accent-blue);
        }

        /* Abstract Hidden State */
        .pub-abstract {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.6s ease-in-out;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
            text-align: justify;
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        .pub-abstract p {
            margin-bottom: 12px;
        }
        
        .pub-abstract p:last-child {
            margin-bottom: 0;
        }

        /* Abstract Visible State on Hover */
        .pub:hover .pub-abstract {
            max-height: 1500px;
            opacity: 1;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed var(--abstract-border);
        }

        .pub-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        .pub-date {
            font-weight: 600;
            color: var(--text-light);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .doi-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }
        
        .doi-btn:hover {
            background-color: var(--accent-blue);
            color: #fff;
            border-color: var(--accent-blue);
        }

        /* ----- Teaching Section (Standard) ----- */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px 30px;
            border: 2px solid var(--border-color);
            transition: all 0.3s;
            text-align: center;
        }

        .card:hover {
            background: var(--card-hover-bg);
            color: var(--card-hover-text);
            transform: translate(-5px, -5px);
            box-shadow: 5px 5px 0px var(--accent-blue);
            border-color: var(--card-hover-bg);
        }

        .card h3 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .card:hover h3 {
            color: var(--card-hover-text);
        }

        /* ----- Footer ----- */
        footer {
            border-top: 2px solid var(--border-color);
            padding: 80px 50px;
            display: flex;
            justify-content: space-between;
            gap: 50px;
            background-color: var(--bg-color);
            transition: border-color 0.4s ease, background-color 0.4s ease;
        }

        .footer-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .brand-col {
            flex: 2;
        }

        .brand-col h2 {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .brand-col p {
            color: var(--text-light);
            font-size: 1.1rem;
            max-width: 400px;
            text-align: justify; 
        }

        .nav-col, .social-col {
            flex: 1;
        }

        .footer-heading {
            color: var(--accent-blue);
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 10px;
            transition: color 0.4s ease;
        }

        .footer-col a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .footer-col a svg {
            transition: fill 0.3s;
            fill: var(--svg-fill);
        }

        .footer-col a:hover {
            color: var(--accent-blue);
        }

        .footer-col a:hover svg {
            fill: var(--accent-blue);
        }

        /* ----- Sub Footer (Copyright Row) ----- */
        .sub-footer {
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--abstract-border);
            background-color: var(--bg-color);
            color: var(--text-light);
            font-size: 0.95rem;
            font-weight: 600;
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
        }

        /* ----- Responsive (Mobile) ----- */
        @media (max-width: 900px) {
            header { padding: 15px 20px; }
            .nav-links { display: none; }

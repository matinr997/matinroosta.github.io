<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matin Roosta | Academic Portfolio</title>
    <link rel="icon" type="image/jpeg" href="images/favicon.jpg">
    <!-- فونت گوگل (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #ffffff;
            color: #111;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ----- هدر و منو ----- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            border-bottom: 2px solid #111;
            z-index: 1000;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #111;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #111;
        }
        .lang-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border: 2px solid #111;
            border-radius: 50%;
            color: #111;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .lang-toggle:hover {
            background-color: #111;
            color: #fff;
        }

        /* ----- بخش اصلی (Hero) ----- */
        .hero {
            display: flex;
            height: 100vh;
            padding-top: 80px; 
            border-bottom: 2px solid #111;
        }

        .content-left {
            flex: 1;
            padding: 80px 80px 80px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 2px solid #111;
        }

        .badge {
            background-color: #111;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            align-self: flex-start;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 4.5rem;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 25px;
        }

        h1 .highlight {
            color: #2548ff;
        }

        p.description {
            font-size: 1.15rem;
            color: #444;
            line-height: 1.8;
            max-width: 90%;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #111;
            color: #fff;
            border: 2px solid #111;
        }

        .btn-primary:hover {
            background-color: #333;
        }

        .btn-primary span {
            margin-left: 8px;
            font-size: 1.2rem;
        }

        .btn-secondary {
            background-color: transparent;
            color: #111;
            border: 2px solid #111;
        }

        .btn-secondary:hover {
            background-color: #f0f0f0;
        }

        /* ----- عکس سمت راست و کپشن زیر آن ----- */
        .image-right {
            flex: 1;
            background-image: url('images/profile.jpg'); 
            background-size: cover;
            background-position: center top;
            filter: grayscale(100%); 
            display: flex;
            align-items: flex-end;
        }

        .image-caption {
            width: 100%;
            background-color: rgba(30, 30, 35, 0.92); 
            color: #fff;
            padding: 10px 30px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* ----- استایل کلی سکشن ها ----- */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 50px;
        }

        /* ----- بخش علایق پژوهشی ----- */
        #research {
            padding: 0;
        }

        .research-item {
            display: flex;
            padding: 80px 50px;
            border-bottom: 1px solid #ddd;
            gap: 50px;
            transition: background-color 0.4s;
        }

        .research-item:hover {
            background-color: #fafafa;
        }

        .research-left {
            flex: 1;
        }

        .research-num {
            color: #2548ff;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .research-left h3 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .research-right {
            flex: 2;
        }

        .research-right p {
            font-size: 1.15rem;
            color: #444;
            margin-bottom: 25px;
            line-height: 1.8;
        }

        .keyword-tags {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            border: 2px solid #111;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #111;
            transition: all 0.3s;
            background: transparent;
        }

        .tag:hover {
            background-color: #111;
            color: #fff;
            transform: translateY(-2px);
        }

        /* ----- سایر بخش ها ----- */
        .section-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 50px;
            border-bottom: 2px solid #111;
            padding-bottom: 20px;
            display: inline-block;
        }

        /* ========================================= */
        /* ----- طراحی بخش مقالات (تعاملی) ----- */
        /* ========================================= */
        .pub-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .pub {
            background: #fff;
            border: 2px solid #111;
            padding: 35px 40px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }
        
        .pub:hover {
            border-color: #2548ff;
            box-shadow: 0 20px 40px rgba(37, 72, 255, 0.1);
            transform: translateY(-5px);
        }

        .pub h4 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.5;
            color: #111;
            transition: color 0.3s;
        }

        .pub:hover h4 {
            color: #2548ff;
        }

        /* چکیده مقاله - در حالت عادی مخفی است */
        .pub-abstract {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s ease; /* انیمیشن نرم تر برای متن طولانی */
            color: #444; /* رنگ متن کمی تیره تر برای خوانایی بهتر */
            font-size: 0.95rem; /* فونت کمی ریزتر برای چکیده طولانی */
            line-height: 1.6;
            text-align: justify;
        }

        /* استایل برای بخش بندی های داخل چکیده */
        .pub-abstract p {
            margin-bottom: 10px;

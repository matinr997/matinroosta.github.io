<!-- فونت گوگل (Inter) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
    }

    body {
        background-color: #ffffff;
        color: #111;
        overflow-x: hidden;
        line-height: 1.6;
    }

    /* ----- هدر و منو ----- */
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(255, 255, 255, 0.98);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 50px;
        border-bottom: 2px solid #111;
        z-index: 1000;
    }

    .logo {
        font-size: 1.2rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #111;
    }

    nav {
        display: flex;
        gap: 30px;
    }

    nav a {
        text-decoration: none;
        color: #555;
        font-weight: 600;
        font-size: 0.95rem;
        transition: color 0.3s;
    }

    nav a:hover {
        color: #111;
    }

    /* ----- بخش اصلی (Hero) ----- */
    .hero {
        display: flex;
        height: 100vh;
        padding-top: 80px; 
        border-bottom: 2px solid #111;
    }

    .content-left {
        flex: 1;
        padding: 80px 80px 80px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-right: 2px solid #111;
    }

    .badge {
        background-color: #111;
        color: #fff;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 8px 12px;
        align-self: flex-start;
        margin-bottom: 30px;
    }

    h1 {
        font-size: 4.5rem;
        line-height: 1.1;
        font-weight: 800;
        letter-spacing: -1.5px;
        margin-bottom: 25px;
    }

    h1 .highlight {
        color: #2548ff;
    }

    p.description {
        font-size: 1.15rem;
        color: #444;
        line-height: 1.8;
        max-width: 90%;
        margin-bottom: 40px;
    }

    .buttons {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 15px 25px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .btn-primary {
        background-color: #111;
        color: #fff;
        border: 2px solid #111;
    }

    .btn-primary:hover {
        background-color: #333;
    }

    .btn-primary span {
        margin-left: 8px;
        font-size: 1.2rem;
    }

    .btn-secondary {
        background-color: transparent;
        color: #111;
        border: 2px solid #111;
    }

    .btn-secondary:hover {
        background-color: #f0f0f0;
    }

    /* عکس سمت راست */
    .image-right {
        flex: 1;
        background-image: url('images/profile.jpg'); 
        background-size: cover;
        background-position: center top;
        filter: grayscale(100%); 
    }

    /* ----- استایل کلی سکشن ها ----- */
    .container {
        max-width: 1200px;
        margin: auto;
        padding: 100px 50px;
    }

    /* ----- بخش علایق پژوهشی ----- */
    #research {
        padding: 0;
    }

    .research-item {
        display: flex;
        padding: 80px 50px;
        border-bottom: 1px solid #ddd;
        gap: 50px;
        transition: background-color 0.4s;
    }

    .research-item:hover {
        background-color: #fafafa;
    }

    .research-left {
        flex: 1;
    }

    .research-num {
        color: #2548ff;
        font-family: monospace;
        font-size: 0.9rem;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 15px;
        text-transform: uppercase;
    }

    .research-left h3 {
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: -1px;
    }

    .research-right {
        flex: 2;
    }

    .research-right p {
        font-size: 1.15rem;
        color: #444;
        margin-bottom: 25px;
        line-height: 1.8;
    }

    .keyword-tags {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }

    .tag {
        border: 2px solid #111;
        padding: 10px 20px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #111;
        transition: all 0.3s;
        background: transparent;
    }

    .tag:hover {
        background-color: #111;
        color: #fff;
        transform: translateY(-2px);
    }

    /* ----- سایر بخش ها ----- */
    .section-title {
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 50px;
        border-bottom: 2px solid #111;
        padding-bottom: 20px;
        display: inline-block;
    }

    /* مقالات */
    .pub {
        border: 2px solid #111;
        padding: 35px;
        margin-bottom: 20px;
        transition: all 0.3s;
        background: #fff;
    }
    
    .pub:hover {
        border-left: 8px solid #2548ff;
        transform: translateX(5px);
    }

    .pub h4 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 15px;
        line-height: 1.5;
    }

    .pub p {
        color: #555;
        font-size: 0.95rem;
    }
    
    .doi-link {
        color: #2548ff;
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.3s;
    }
    
    .doi-link:hover {
        opacity: 0.7;
    }

    /* کارت های تدریس */
    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 25px;
    }

    .card {
        background: #fff;
        padding: 40px 30px;
        border: 2px solid #111;
        transition: all 0.3s;
        text-align: center;
    }

    .card:hover {
        background: #111;
        color: #fff;
        transform: translate(-5px, -5px);
        box-shadow: 5px 5px 0px #2548ff;
    }

    .card h3 {
        font-size: 1.3rem;
        font-weight: 700;
    }

    /* ----- فوتر ----- */
    footer {
        border-top: 2px solid #111;
        padding: 80px 50px;
        display: flex;
        justify-content: space-between;
        gap: 50px;
        background-color: #fff;
    }

    .footer-col {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .brand-col {
        flex: 2;
    }

    .brand-col h2 {
        font-size: 1.5rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
    }

    .brand-col p {
        color: #555;
        font-size: 1.1rem;
        max-width: 400px;
    }

    .nav-col, .social-col {
        flex: 1;
    }

    .footer-heading {
        color: #2548ff;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-size: 0.9rem;
        margin-bottom: 10px;
    }

    .footer-col a {
        color: #111;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.1rem;
        transition: color 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .footer-col a svg {
        transition: fill 0.3s;
    }

    .footer-col a:hover {
        color: #2548ff;
    }

    .footer-col a:hover svg {
        fill: #2548ff;
    }

    /* ========================================= */
    /* ----- واکنش‌گرا (موبایل) تنظیمات بهینه شده ----- */
    /* ========================================= */
    @media (max-width: 900px) {
        header { padding: 15px 20px; }
        .nav-links { display: none; } 
        
        /* تنظیمات باکس اصلی متن */
        .hero { flex-direction: column; height: auto; padding-top: 70px; }
        .content-left { padding: 40px 20px; border-right: none; border-bottom: 2px solid #111; }
        
        /* سایز فونت ها برای گوشی */
        h1 { font-size: 2.8rem; margin-bottom: 15px; }
        p.description { font-size: 1rem; margin-bottom: 30px; }
        
        /* دکمه ها در گوشی زیر هم قرار میگیرند */
        .buttons { flex-direction: column; width: 100%; gap: 10px; }
        .btn { width: 100%; }
        
        /* حل مشکل غیب شدن عکس در گوشی */
        .image-right { 
            width: 100%; 
            min-height: 450px; 
            background-position: center 20%; 
        }
        
        /* فاصله های سایر بخش ها در گوشی */
        .container { padding: 40px 20px; }
        .section-title { font-size: 2.2rem; margin-bottom: 30px; }
        
        /* تنظیمات لیست پژوهش ها */
        .research-item { flex-direction: column; padding: 40px 20px; gap: 15px; }
        .research-left h3 { font-size: 1.8rem; }
        .research-right p { font-size: 1rem; margin-bottom: 15px;}
        .tag { font-size: 0.85rem; padding: 8px 15px; }
        
        /* مقالات و فوتر */
        .pub { padding: 25px 20px; }
        .pub h4 { font-size: 1.1rem; }
        footer { flex-direction: column; padding: 40px 20px; gap: 40px; }
        .brand-col p { font-size: 1rem; }
    }
</style>
